<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>パズルゲーム開発</title>
    <style>
      /* 画面の真ん中にゲーム画面を表示するためのスタイル */
      body {
        margin: 0;
        background-color: #202020; /* 背景を暗いグレーに */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        background-color: #000000; /* ゲーム画面は真っ黒に */
        border: 4px solid #ffffff; /* 白い枠線をつける */
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="300" height="600"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
