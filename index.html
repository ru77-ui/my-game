<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>パズルゲーム開発</title>
    <style>
      body {
        margin: 0;
        background-color: #202020;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 10px;
        font-family: sans-serif;
      }
      /* スコア表示のスタイル（Canvasの横幅に合わせる） */
      .game-header {
        width: 300px;
        display: flex;
        justify-content: flex-end; /* 右上に寄せる */
        color: #ffffff;
        font-size: 20px;
        font-weight: bold;
      }
      canvas {
        background-color: #000000;
        border: 4px solid #ffffff;
      }
      .btn-container {
        display: flex;
        gap: 10px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        background-color: #3182ce;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      button:hover {
        background-color: #2b6cb0;
      }
      button:disabled {
        background-color: #4a5568;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="game-header">
      <div>SCORE: <span id="score-val">0</span></div>
    </div>

    <canvas id="game" width="300" height="600"></canvas>
    
    <div class="btn-container">
      <button id="start-btn">スタート</button>
      <button id="pause-btn" disabled>ポーズ</button>
    </div>

 <script type="module" src="./src/main.ts"></script>
  </body>
</html>
